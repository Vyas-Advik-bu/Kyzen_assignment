services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}      # https://aistudio.google.com/apikey
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}      # https://app.tavily.com
      - PRIMARY_MODEL=gemini-3.1-flash-lite
      - FALLBACK_MODEL=gemini-2.5-flash-lite

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

