# GPU override — merge with base compose for NVIDIA GPU acceleration:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
# Requires: NVIDIA drivers + nvidia-container-toolkit installed on the host.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
